name: $(GitVersion.FullSemVer)
pool:
  name: meshmakers-ci-agents

variables:
  buildConfiguration: Release

trigger:
  batch: true
  branches:
    include:
      - master
  paths:
    exclude:
      - docs/*
      - README.md

steps:
  # GitVersion needs the full history + tags to compute a version. The default
  # checkout is a shallow (--depth=1) clone, which makes GitVersion fail with
  # "Cannot find commit ... ensure the repository is an unshallow clone". Fetch
  # the entire history and tags first.
  - checkout: self
    fetchDepth: 0
    fetchTags: true

  - task: gitversion/setup@0
    displayName: Install GitVersion
    inputs:
      versionSpec: '5.x'
  - task: gitversion/execute@0
    displayName: Determine Version      

  - script: dotnet pack ./src/XMLDoc2Markdown/XMLDoc2Markdown.csproj -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/out -p:Version=$(GitVersion.SemVer)
    displayName: 'dotnet pack'

  - publish: $(Build.ArtifactStagingDirectory)/out
    artifact: out
    displayName: 'Publish artifact'

  - task: DotNetCoreCLI@2
    displayName: Push Nuget Package
    inputs:
      command: custom
      custom: nuget
      arguments: >
        push $(Build.ArtifactStagingDirectory)/**/*.nupkg
        -s https://api.nuget.org/v3/index.json
        -k $(NuGetApiKey)           
